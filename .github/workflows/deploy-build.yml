name: Build Deploy Image

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - 'docker/**'
      - 'pyproject.toml'
      - '.github/workflows/deploy-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push deploy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/arkodaai/gobii-deploy:latest
            ghcr.io/arkodaai/gobii-deploy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
